services:
  db_postgres:
    container_name: KamannPostgres
    build:
      context: .
      dockerfile: postgres.dockerfile
    environment:
      POSTGRES_DB: DB
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_db:/var/lib/postgres/data

volumes:
  postgres_db: