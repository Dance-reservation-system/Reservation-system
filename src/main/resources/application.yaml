spring:
  application:
    name: Reservation-system

  profiles:
    default: local

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    info:
      access: read_only
    health:
      access: read_only
    metrics:
      access: read_only