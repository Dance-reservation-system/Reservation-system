#For test environment

spring:
  docker:
    compose:
      enabled: true
      file: .docker/docker-compose-dev.yml

  flyway:
    flyway:
      url: jdbc:postgresql://localhost:5432/kamann_db
      user: user
      password: password

  datasource:
    url: jdbc:postgresql://localhost:5432/kamann_db
    username: user
    password: password

  security:
    oauth2:
      base-url: http://localhost:8081/realms/kamann-test/protocol/openid-connect
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/kamann-test
          jwk-set-uri: http://localhost:8081/realms/kamann-test/protocol/openid-connect/certs

      client:
        registration.kamann:
          client-id: kamann-test-keycloak-id
          client-secret: wwvx47AKLTJqu0KcbFA4xF92DT4RWSAg
          scope:
            - openid
            - profile
            - roles
          authorization-grant-type: authorization_code
          redirect-uri: http://localhost:8080/login/oauth2/code/kamann

        provider.kamann:
          authorization-uri: http://localhost:8081/realms/kamann-app/protocol/openid-connect/auth
          token-uri: http://localhost:8081/realms/kamann-app/protocol/openid-connect/token
          jwk-set-uri: http://localhost:8081/realms/kamann-app/protocol/openid-connect/certs
          user-info-uri: http://localhost:8081/realms/kamann-app/protocol/openid-connect/userinfo
          user-name-attribute: preferred_username

logging:
  level:
    root: DEBUG
    org.springframework: DEBUG
