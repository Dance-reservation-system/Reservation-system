spring:
  docker:
    compose:
      enabled: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/kamann_db
    user: user
    password: password
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/kamann_db
    username: user
    password: password

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
