name: Create Branch from Linear Bot Comment

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  issue_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      comment_body:
        description: "Simulated Linear bot comment"
        required: true
        type: string
      labels:
        description: "Comma-separated labels (e.g., bug, documentation)"
        required: false
        type: string

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Set inputs for manual run or real comment
        id: set_vars
        run: |
          if [ -n "${{ github.event.inputs.comment_body }}" ]; then
            echo "COMMENT=${{ github.event.inputs.comment_body }}" >> $GITHUB_ENV
            echo "LABELS=${{ github.event.inputs.labels }}" >> $GITHUB_ENV
          else
            echo "COMMENT=${{ github.event.comment.body }}" >> $GITHUB_ENV
            echo "LABELS=$(echo '${{ toJSON(github.event.issue.labels) }}' | jq -r '.[].name' | paste -sd ',' -)" >> $GITHUB_ENV
          fi

      - name: Extract branch name and determine prefix
        id: extract
        run: |
          TICKET=$(echo "$COMMENT" | awk '{print tolower($1)}')
          TITLE=$(echo "$COMMENT" | cut -d' ' -f2-)
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          PREFIX="feature"
          if echo "$LABELS" | grep -iqE "(bug|fix)"; then
            PREFIX="bugfix"
          elif echo "$LABELS" | grep -iq "chore"; then
            PREFIX="chore"
          elif echo "$LABELS" | grep -iqE "(docs|documentation)"; then
            PREFIX="docs"
          elif echo "$LABELS" | grep -iqE "(feature|enhancement)"; then
            PREFIX="feature"
          fi

          BRANCH_NAME="${PREFIX}/${TICKET}-${SLUG}"

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push branch from develop
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git fetch origin develop
          git checkout -b "$BRANCH_NAME" origin/develop
          git push origin "$BRANCH_NAME"

      - name: Comment with branch link
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL="${{ github.event.issue.url }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          COMMENT_BODY="🚀 Branch [\`${BRANCH_NAME}\`](${REPO_URL}/tree/${BRANCH_NAME}) created from \`develop\`."
          curl -s -X POST -H "Authorization: token ${GH_TOKEN}"             -H "Content-Type: application/json"             -d "{"body":"$COMMENT_BODY"}"             "$ISSUE_URL/comments"
