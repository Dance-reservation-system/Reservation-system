services:
  kamann_db:
    container_name: kamann_db
    image: postgres:16.3
    environment:
      POSTGRES_DB: kamann_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - kamann_db_volume:/var/lib/postgres/data

volumes:
  kamann_db_volume: