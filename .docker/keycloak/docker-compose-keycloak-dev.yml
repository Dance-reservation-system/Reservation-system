services:
  kamann_keycloak_dev:
    container_name: kamann_keycloak_dev
    build:
      dockerfile: Dockerfile
    environment:
      KC_DB: ${KC_DB}
      KC_DB_URL_HOST: ${KC_DB_URL_HOST}
      KC_DB_URL_DATABASE: ${KC_DB_URL_DATABASE}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_DB_SCHEMA: ${KC_DB_SCHEMA}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      kamann_keycloak_db_dev:
        condition: service_healthy
    networks:
      - kamann_network

  kamann_keycloak_db_dev:
    container_name: kamann_keycloak_db_dev
    image: postgres:16.3
    environment:
      POSTGRES_DB: ${KC_POSTGRES_DB}
      POSTGRES_USER: ${KC_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - kamann_keycloak_db_dev_volume:/var/lib/postgresql/data
    networks:
      - kamann_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KC_POSTGRES_USER} -d ${KC_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kamann_keycloak_db_dev_volume:

networks:
  kamann_network:
